---
apiVersion: v1
kind: Namespace
metadata:
  creationTimestamp: null
  name: project5
spec: {}
status: {}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: aristo-app
  name: aristo-app
  namespace: project5
spec:
  replicas: 4
  selector:
    matchLabels:
      app: aristo-app
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: aristo-app
    spec:
      containers:
      - image: registry.access.redhat.com/ubi9/httpd-24:9.7
        name: httpd-24
        ports:
        - containerPort: 8080
        resources: {}
      startupProbe:
        exec:
          command:
          - /bin/bash
          - -c
          - tail -n 2 /etc/passwd
        failureThreshold: 6
        periodSeconds: 10
        successThreshold: 1
        timeoutSeconds: 1
        failureThreshold: 6

      readinessProbe:
        tcpSocket:
          port: 8080
        periodSeconds: 10
        failureThreshold: 6
        successThreshold: 1

      livenessProbe:
        failureThreshold: 6
        httpGet:
          path: /index.php
          port: 8080
          scheme: HTTP
        periodSeconds: 10
        failureThreshold: 6
        successThreshold: 1
        timeoutSeconds: 1

status: {}

---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    app: aristo-app
  name: aristo-app
  namespace: project5
spec:
  ports:
  - port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app: aristo-app
status:
  loadBalancer: {}

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  creationTimestamp: null
  labels:
    app: aristo-app
  name: aristo-app
  namespace: project5
spec:
  port:
    targetPort: 8080
  to:
    kind: ""
    name: aristo-app
    weight: null
status: {}

