apiVersion: v1
kind: Pod
metadata:
  creationTimestamp: null
  labels:
    run: dbpod
  name: dbpod
spec:
  
  containers:
  - env:
    - name: MYSQL_USER
      value: marius
    - name: MYSQL_PASSWORD
      value: mypa55
    - name: MYSQL_DATABASE
      value: aristo
    - name: MYSQL_ROOT_PASSWORD
      value: r00tpa55
    image: registry.fedoraproject.org/f32/mysql
    imagePullPolicy: Never
    name: dbpod
    ports:
    - containerPort: 3306
    resources: {}
  dnsPolicy: ClusterFirst
  restartPolicy: Never
status: {}
